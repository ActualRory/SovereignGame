services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kingdoms
      POSTGRES_DB: kingdoms
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:kingdoms@postgres:5432/kingdoms
      REDIS_URL: redis://redis:6379
      PORT: "3001"
      CLIENT_URL: "https://rule.tastethevideogame.win"
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  redisdata:
